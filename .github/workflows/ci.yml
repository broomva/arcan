name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/praxis.git ../praxis
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          git clone --depth 1 https://github.com/broomva/nous.git ../nous
          git clone --depth 1 https://github.com/broomva/anima.git ../anima
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/praxis.git ../praxis
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          git clone --depth 1 https://github.com/broomva/nous.git ../nous
          git clone --depth 1 https://github.com/broomva/anima.git ../anima
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/praxis.git ../praxis
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          git clone --depth 1 https://github.com/broomva/nous.git ../nous
          git clone --depth 1 https://github.com/broomva/anima.git ../anima
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  console:
    name: Console Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/arcan-console/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bun run lint
      - name: Unit tests
        run: bun run test
      - name: Production build
        run: bun run build

  build:
    name: Build Release
    needs: [test, console]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/praxis.git ../praxis
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          git clone --depth 1 https://github.com/broomva/nous.git ../nous
          git clone --depth 1 https://github.com/broomva/anima.git ../anima
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: Swatinem/rust-cache@v2
      - name: Install console deps
        run: cd crates/arcan-console/frontend && bun install --frozen-lockfile
      - run: cargo build --workspace --release

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/praxis.git ../praxis
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          git clone --depth 1 https://github.com/broomva/nous.git ../nous
          git clone --depth 1 https://github.com/broomva/anima.git ../anima
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/praxis.git ../praxis
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          git clone --depth 1 https://github.com/broomva/nous.git ../nous
          git clone --depth 1 https://github.com/broomva/anima.git ../anima
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --locked
      - run: cargo deny check
