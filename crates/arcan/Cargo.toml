[package]
name = "arcan"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Rust agent runtime with streaming, tool execution, and event-sourced persistence"
readme = "../../README.md"

[[bin]]
name = "arcan"
path = "src/main.rs"

[lints]
workspace = true

[features]
default = ["console"]
console = ["dep:arcan-console"]
spaces = ["dep:arcan-spaces", "arcan-spaces/spacetimedb"]
praxis = ["dep:arcan-praxis"]

[dependencies]
arcan-console = { path = "../arcan-console", version = "0.2.1", optional = true }
arcan-spaces = { path = "../arcan-spaces", version = "0.2.1", optional = true }
arcan-praxis = { path = "../arcan-praxis", version = "0.2.1", optional = true }
arcan-core = { path = "../arcan-core", version = "0.2.1" }
arcan-aios-adapters = { path = "../arcan-aios-adapters", version = "0.2.1" }
arcan-harness = { path = "../arcan-harness", version = "0.2.1" }
praxis-core.workspace = true
praxis-tools.workspace = true
arcan-provider = { path = "../arcan-provider", version = "0.2.1" }
arcand = { path = "../arcand", version = "0.2.1" }
arcan-lago = { path = "../arcan-lago", version = "0.2.1" }
arcan-tui = { path = "../arcan-tui", version = "0.2.1" }
aios-protocol.workspace = true
aios-runtime.workspace = true
lago-core.workspace = true
lago-fs.workspace = true
lago-aios-eventstore-adapter.workspace = true
lago-journal.workspace = true
lago-policy.workspace = true
lago-store.workspace = true
anyhow.workspace = true
async-trait.workspace = true
axum.workspace = true
clap.workspace = true
dirs.workspace = true
futures-util.workspace = true
reqwest.workspace = true
reqwest-eventsource.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
tokio.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-appender = "0.2"
vigil.workspace = true
chrono.workspace = true

[dev-dependencies]
tempfile = "3"
